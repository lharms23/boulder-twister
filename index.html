<!DOCTYPE html>
<html lang="de">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Boulder Twister">
  <title>Boulder Twister</title>
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
 <style>
    :root {
      --ios-blue: #007AFF;
      --ios-bg: #F2F2F7;
      --ios-card: rgba(255, 255, 255, 0.9);
      --ios-text: #000000;
      --ios-text-sec: #8E8E93;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ios-bg: #000000;
        --ios-card: rgba(28, 28, 30, 0.9);
        --ios-text: #FFFFFF;
      }
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--ios-bg);
      color: var(--ios-text);
      /* Fallback für Safari */
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .app-container {
      max-width: 500px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    }

    h1 { font-size: 32px; font-weight: 800; margin: 20px 0 10px; letter-spacing: -0.5px; }

    .screen { display: none; flex-direction: column; height: 100%; }
    .screen.active { display: flex; }

    .glass-card {
      background: var(--ios-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      margin-top: 10px;
    }

    .input-field {
      width: 100%;
      background: rgba(142, 142, 147, 0.15);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 17px;
      color: var(--ios-text);
      margin-bottom: 12px;
    }

    .btn {
      border-radius: 14px;
      border: none;
      font-weight: 600;
      font-size: 17px;
      padding: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); opacity: 0.8; }
    .btn:disabled { opacity: 0.25; cursor: default; transform: none; }
    .btn-primary { background: var(--ios-blue); color: white; }
    .btn-secondary { background: rgba(0, 122, 255, 0.15); color: var(--ios-blue); }
    .btn-ghost { background: transparent; color: var(--ios-blue); }

    .player-tag {
      display: inline-flex;
      align-items: center;
      background: var(--ios-blue);
      color: white;
      padding: 8px 14px;
      border-radius: 20px;
      margin: 4px;
      font-size: 14px;
      font-weight: 600;
    }
    .player-tag span { margin-left: 8px; font-weight: 400; cursor: pointer; padding: 0 4px; }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .color-dot {
      aspect-ratio: 1;
      border-radius: 50%;
      position: relative;
      border: 1px solid rgba(0,0,0,0.1);
    }
    
    .color-dot.selected::after {
      content: '✓';
      position: absolute;
      inset: -3px;
      border: 3px solid var(--ios-blue);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ios-blue);
      background: rgba(255, 255, 255, 0.3);
      font-weight: 900;
      font-size: 18px;
    }

    .game-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .indicator { font-size: 80px; margin: 15px 0; }
    .player-now { font-size: 40px; font-weight: 800; margin-bottom: 5px; }
    .info-label { color: var(--ios-text-sec); text-transform: uppercase; font-size: 12px; font-weight: 600; letter-spacing: 1px; }

    .controls { padding: 20px 0 40px; display: grid; gap: 10px; }
  </style>
</head>
<body>

<div class="app-container">
  <section id="onboardingScreen" class="screen active">
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
      <h1>Wer klettert?</h1>
      <div class="glass-card">
        <input type="text" id="nameInput" class="input-field" placeholder="Name..." autocomplete="off">
        <button class="btn btn-primary" id="addNameBtn" style="width: 100%;">Hinzufügen</button>
        <div id="playerList" style="margin-top: 15px; display: flex; flex-wrap: wrap;"></div>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" id="toColorsBtn" disabled>Weiter zur Farbwahl</button>
    </div>
  </section>

  <section id="colorScreen" class="screen">
    <div style="flex: 1; overflow-y: auto;">
      <div style="display: flex; justify-content: space-between; align-items: baseline;">
        <h1>Farben</h1>
        <button id="selectAllBtn" class="btn btn-ghost" style="padding: 0; font-size: 15px;">Alle wählen</button>
      </div>
      <div class="glass-card">
        <div class="color-grid" id="colorGrid"></div>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-primary" id="startGameBtn" disabled>Spiel starten</button>
      <button class="btn btn-ghost" id="backToPlayers">Zurück</button>
    </div>
  </section>

  <section id="gameScreen" class="screen">
    <div style="display: flex; justify-content: flex-end; padding-top: 10px;">
      <button class="btn btn-ghost" id="resetGame">Beenden</button>
    </div>
    <div class="game-main">
      <div class="info-label" id="roundInfo">Runde 1</div>
      <div class="player-now" id="displayPlayer">Name</div>
      <div class="indicator" id="displayLimb">🧗</div>
      <div id="displayColorCircle" style="width: 100px; height: 100px; border-radius: 30px; margin-top: 10px;"></div>
      <div id="displayColorName" style="margin-top: 15px; font-weight: 700; font-size: 24px;">Bereit?</div>
    </div>
    <div class="controls">
      <button class="btn btn-primary" id="spinBtn" style="height: 80px; font-size: 20px;">Nächster Zug</button>
    </div>
  </section>
</div>

<script>
  // Daten
  const COLORS = [
    { name: 'Gelb', hex: '#FFD60A' }, { name: 'Grün', hex: '#34C759' },
    { name: 'Orange', hex: '#FF9500' }, { name: 'Rot', hex: '#FF3B30' },
    { name: 'Blau', hex: '#007AFF' }, { name: 'Lila', hex: '#AF52DE' },
    { name: 'Weiß', hex: '#FFFFFF' }, { name: 'Schwarz', hex: '#1C1C1E' }
  ];

  const state = {
    players: [],
    selectedColors: [],
    currentIndex: 0,
    round: 1
  };

  // DOM Elemente
  const ui = {
    onboarding: document.getElementById('onboardingScreen'),
    colors: document.getElementById('colorScreen'),
    game: document.getElementById('gameScreen'),
    playerList: document.getElementById('playerList'),
    nameInput: document.getElementById('nameInput'),
    colorGrid: document.getElementById('colorGrid'),
    toColorsBtn: document.getElementById('toColorsBtn'),
    startGameBtn: document.getElementById('startGameBtn'),
    selectAllBtn: document.getElementById('selectAllBtn'),
    displayPlayer: document.getElementById('displayPlayer'),
    displayLimb: document.getElementById('displayLimb'),
    displayColorCircle: document.getElementById('displayColorCircle'),
    displayColorName: document.getElementById('displayColorName'),
    roundInfo: document.getElementById('roundInfo')
  };

  function showScreen(screenId) {
    ui.onboarding.classList.remove('active');
    ui.colors.classList.remove('active');
    ui.game.classList.remove('active');
    ui[screenId].classList.add('active');
  }

  // SPIELER LOGIK
  function updatePlayerUI() {
    ui.playerList.innerHTML = '';
    state.players.forEach(function(name, i) {
      const tag = document.createElement('div');
      tag.className = 'player-tag';
      tag.innerHTML = name + '<span onclick="removePlayer(' + i + ')">✕</span>';
      ui.playerList.appendChild(tag);
    });
    ui.toColorsBtn.disabled = state.players.length < 1;
  }

  window.removePlayer = function(index) {
    state.players.splice(index, 1);
    updatePlayerUI();
  };

  function addPlayer() {
    const val = ui.nameInput.value.trim();
    if (val) {
      state.players.push(val);
      ui.nameInput.value = '';
      ui.nameInput.focus();
      updatePlayerUI();
    }
  }

  document.getElementById('addNameBtn').addEventListener('click', addPlayer);
  ui.nameInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') addPlayer();
  });

  ui.toColorsBtn.addEventListener('click', function() { showScreen('colors'); });

  // FARBEN LOGIK
  function renderColors() {
    ui.colorGrid.innerHTML = '';
    COLORS.forEach(function(color) {
      const dot = document.createElement('div');
      dot.className = 'color-dot';
      if (state.selectedColors.indexOf(color.name) > -1) {
        dot.classList.add('selected');
      }
      dot.style.backgroundColor = color.hex;
      dot.onclick = function() {
        const idx = state.selectedColors.indexOf(color.name);
        if (idx > -1) {
          state.selectedColors.splice(idx, 1);
        } else {
          state.selectedColors.push(color.name);
        }
        renderColors();
        ui.startGameBtn.disabled = state.selectedColors.length === 0;
      };
      ui.colorGrid.appendChild(dot);
    });
    ui.selectAllBtn.textContent = state.selectedColors.length === COLORS.length ? 'Alle abwählen' : 'Alle wählen';
  }

  ui.selectAllBtn.onclick = function() {
    if (state.selectedColors.length === COLORS.length) {
      state.selectedColors = [];
    } else {
      state.selectedColors = COLORS.map(function(c) { return c.name; });
    }
    renderColors();
    ui.startGameBtn.disabled = state.selectedColors.length === 0;
  };

  document.getElementById('backToPlayers').onclick = function() { showScreen('onboarding'); };

  // GAME ENGINE
  ui.startGameBtn.onclick = function() {
    state.currentIndex = 0;
    state.round = 1;
    ui.displayPlayer.textContent = state.players[0];
    showScreen('game');
  };

  document.getElementById('spinBtn').onclick = function() {
    if (window.navigator.vibrate) window.navigator.vibrate(40);
    
    const limbs = [
      {icon: '✋', text: 'Hand'}, 
      {icon: '🦶', text: 'Fuß'}
    ];
    const move = limbs[Math.floor(Math.random() * limbs.length)];
    
    const activeColors = COLORS.filter(function(c) {
      return state.selectedColors.indexOf(c.name) > -1;
    });
    const color = activeColors[Math.floor(Math.random() * activeColors.length)];

    ui.displayLimb.textContent = move.icon;
    ui.displayColorName.textContent = move.text + ' auf ' + color.name;
    ui.displayColorCircle.style.backgroundColor = color.hex;
    ui.displayPlayer.textContent = state.players[state.currentIndex];
    ui.roundInfo.textContent = 'Runde ' + state.round;

    state.currentIndex = (state.currentIndex + 1) % state.players.length;
    if (state.currentIndex === 0) state.round++;
  };

  document.getElementById('resetGame').onclick = function() {
    if (confirm('Spiel beenden?')) location.reload();
  };

  // Start
  renderColors();
</script>
</body>
</html>
